services:
  postgres:
    image: postgres:16
    container_name: btl-datawarehouse
    restart: unless-stopped
    environment:
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: dw_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data:/data:ro
      - ./create_tables_and_load_data.sql:/docker-entrypoint-initdb.d/01-create_tables_and_load_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_user -d dw_db"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
